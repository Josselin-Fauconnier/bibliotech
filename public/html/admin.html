<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>const t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard </title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <header class="header">
    <a href="/" class="site-name">BiblioTech</a>
  </header>
  <nav id="main-nav" class="nav"></nav>

  <main class="main">
    <h1 class="page-title">Dashboard Admin</h1>

    <div class="admin-grid">

      <section class="admin-section">
        <h2 class="admin-section__title">Utilisateurs</h2>
        <p id="users-status" class="status" aria-live="polite"></p>
        <table id="users-table" class="admin-table">
          <thead>
            <tr>
              <th>Nom</th>
              <th>Rôle</th>
              <th>Inscription</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
        <div id="users-pagination" class="pagination"></div>
      </section>

      <div class="banned-split">

        <section class="admin-section">
          <h2 class="admin-section__title">Bannis temporairement</h2>
          <p id="banned-temp-status" class="status" aria-live="polite"></p>
          <table class="admin-table">
            <thead>
              <tr>
                <th>Pseudo</th>
                <th>Raison</th>
                <th>Temps restant</th>
              </tr>
            </thead>
            <tbody id="banned-temp-body"></tbody>
          </table>
          <div id="banned-temp-pagination" class="pagination"></div>
        </section>

        <section class="admin-section">
          <h2 class="admin-section__title">Bannis définitivement</h2>
          <p id="banned-perm-status" class="status" aria-live="polite"></p>
          <table class="admin-table">
            <thead>
              <tr>
                <th>Pseudo</th>
                <th>Raison</th>
              </tr>
            </thead>
            <tbody id="banned-perm-body"></tbody>
          </table>
          <div id="banned-perm-pagination" class="pagination"></div>
        </section>

      </div>

      <section class="admin-section">
        <h2 class="admin-section__title">Commentaires</h2>
        <p id="comments-status" class="status" aria-live="polite"></p>
        <table id="comments-table" class="admin-table">
          <thead>
            <tr>
              <th>Utilisateur</th>
              <th>Livre</th>
              <th>Commentaire</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="comments-body"></tbody>
        </table>
        <div id="comments-pagination" class="pagination"></div>
      </section>

    </div>

  </main>

  <div id="ban-modal" class="modal hidden">
    <div class="modal__box">
      <h3>Bannir l'utilisateur</h3>
      <label>Raison
        <input id="ban-reason" type="text" placeholder="spam, abus...">
      </label>
      <label>Durée (jours, vide = permanent)
        <input id="ban-duration" type="number" min="1" placeholder="ex: 7">
      </label>
      <div class="modal__actions">
        <button id="ban-cancel">Annuler</button>
        <button id="ban-confirm">Confirmer</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/pages/admin.js"></script>

</body>
</html>
