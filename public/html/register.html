<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription </title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header class="header">
    <a href="/" class="site-name">BiblioTech</a>
  </header>
  <nav id="main-nav" class="nav"></nav>

  <main class="main">

    <div class="auth-card">
      <h1 class="auth-card__title">Créer un compte</h1>

      <p id="auth-error" class="auth-error" role="alert" aria-live="assertive"></p>

      <form id="register-form" class="auth-form" novalidate>

        <div class="auth-form__field">
          <label for="username" class="auth-form__label">Nom d'utilisateur</label>
          <input type="text" id="username" name="username" class="auth-form__input" autocomplete="username" required>
        </div>

        <div class="auth-form__field">
          <label for="email" class="auth-form__label">Adresse e-mail</label>
          <input type="email" id="email" name="email" class="auth-form__input" autocomplete="email" required>
        </div>

        <div class="auth-form__field">
          <label for="password" class="auth-form__label">Mot de passe</label>
          <input type="password" id="password" name="password" class="auth-form__input" autocomplete="new-password" aria-describedby="password-hint" required>
          <p id="password-hint" class="auth-form__hint">12 caractères minimum, une majuscule, un chiffre et un caractère spécial</p>
        </div>

        <button type="submit" class="auth-form__btn">Créer mon compte</button>

      </form>

      <p class="auth-card__footer">
        <a href="/html/login.html" class="auth-card__link">Se connecter</a>
      </p>
    </div>

  </main>

  <script type="module" src="/js/pages/register.js"></script>

</body>
</html>
