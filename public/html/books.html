<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>const t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recherche BiblioTech</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/books.css">
</head>
<body>

  <header class="header">
    <a href="/" class="site-name">BiblioTech</a>
  </header>
  <nav id="main-nav" class="nav"></nav>

  <main class="main">

    <h1 class="page-title">Rechercher un livre</h1>

    <form id="search-form" class="search-form" role="search">
      <label for="search-input" class="sr-only">Rechercher un livre</label>
      <input
        type="search"
        id="search-input"
        class="search-form__input"
        placeholder="Titre, auteur, ISBN..."
        autocomplete="off"
      >
      <button type="submit" class="search-form__btn">Rechercher</button>
    </form>

    <p id="status-message" class="status" aria-live="polite"></p>

    <div id="books-grid" class="books-grid" role="list"></div>
    <div id="books-pagination" class="pagination"></div>

  </main>

  <footer id="main-footer" class="footer"></footer>

  <script type="module" src="/js/pages/books.js"></script>

</body>
</html>
