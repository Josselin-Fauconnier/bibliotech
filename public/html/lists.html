<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>const t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes listes</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/lists.css">
</head>
<body>

  <a href="#main-content" class="skip-links">Aller au contenu principal</a>

  <header class="header">
    <a href="/" class="site-name">BiblioTech</a>
  </header>
  <nav id="main-nav" class="nav"></nav>

  <main id="main-content" class="main">

    <h1 class="page-title">Mes listes de lecture</h1>

    <form id="create-list-form" class="form-list" >
      <div class="form-list__field">
        <label for="list-name" class="form-list__label">Nom de la liste</label>
        <input
          type="text"
          id="list-name"
          name="list-name"
          class="form-list__input"
          placeholder="Ex : Livres à lire..."
          required
        >
      </div>
      <button type="submit" class="form-list__btn">Créer la liste</button>
    </form>

    <p id="list-error" class="auth-error" role="alert" aria-live="assertive"></p>

    <ul id="lists-container" class="lists-container"></ul>

  </main>

  <footer id="main-footer" class="footer"></footer>

  <script type="module" src="/js/pages/lists.js"></script>

</body>
</html>
